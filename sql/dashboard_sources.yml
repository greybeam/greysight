sources:
  - id: warehouse_spend_daily
    kind: snowflake_account_usage
    sql_path: sql/snowflake/warehouse_spend_daily.sql
    grain:
      - usage_date
      - warehouse_name
  - id: service_spend_daily
    kind: snowflake_account_usage
    sql_path: sql/snowflake/service_spend_daily.sql
    grain:
      - usage_date
      - service_type
  - id: query_compute_by_user_daily
    kind: snowflake_account_usage
    sql_path: sql/snowflake/query_compute_by_user_daily.sql
    grain:
      - usage_date
      - user_name
      - warehouse_name
  - id: database_storage_daily
    kind: snowflake_account_usage
    sql_path: sql/snowflake/database_storage_daily.sql
    grain:
      - usage_date
      - database_name
  - id: org_spend_daily
    kind: snowflake_organization_usage
    sql_path: sql/snowflake/org_spend_daily.sql
    grain:
      - usage_date
      - service_type
      - rating_type
      - billing_type
      - is_adjustment
      - currency
  - id: rate_sheet_daily
    kind: snowflake_organization_usage
    sql_path: sql/snowflake/rate_sheet_daily.sql
    grain:
      - usage_date
      - service_type
      - usage_type
      - rating_type
      - currency
  - id: capacity_balance_daily
    kind: snowflake_organization_usage
    sql_path: sql/snowflake/capacity_balance_daily.sql
    grain:
      - usage_date
      - currency
  - id: current_account
    kind: snowflake_metadata
    sql_path: sql/snowflake/current_account.sql
    grain:
      - account_locator

derived_datasets:
  - id: account_spend_daily
    depends_on:
      - service_spend_daily
